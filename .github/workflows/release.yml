# Tag-driven release (openspec change: cicd-docker-pipeline, spec: release-publish).
# Pushing vX.Y.Z builds the production image and publishes it to GHCR as
# X.Y.Z (immutable) + latest, then creates a GitHub Release. Auth is the
# built-in GITHUB_TOKEN only — no repository secrets.
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/vezril/dionysus-planner
  HUB_IMAGE: calvinference/dionysus-planner

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    # Exposed as env so steps can condition on secret presence (secrets are
    # not directly readable in step `if` expressions). If the Docker Hub
    # secrets are removed, releases keep publishing to GHCR and skip Hub.
    env:
      DOCKERHUB_USERNAME_SET: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version tags are immutable: refuse to overwrite an existing image.
      # `latest` is the only mutable tag.
      - name: Refuse to overwrite an existing version tag
        run: |
          if docker manifest inspect "$IMAGE:${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "::error::$IMAGE:${{ steps.version.outputs.version }} already exists — version tags are immutable. Bump the version."
            exit 1
          fi
          echo "Tag ${{ steps.version.outputs.version }} is free — proceeding."

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME_SET == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          TAGS="$IMAGE:${{ steps.version.outputs.version }},$IMAGE:latest"
          if [ "$DOCKERHUB_USERNAME_SET" = "true" ]; then
            TAGS="$TAGS,$HUB_IMAGE:${{ steps.version.outputs.version }},$HUB_IMAGE:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
