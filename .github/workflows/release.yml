# Tag-driven release (openspec change: cicd-docker-pipeline, spec: release-publish).
# Pushing vX.Y.Z builds the production image and publishes it to GHCR as
# X.Y.Z (immutable) + latest, then creates a GitHub Release. Auth is the
# built-in GITHUB_TOKEN only — no repository secrets.
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/vezril/dionysus-planner

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version tags are immutable: refuse to overwrite an existing image.
      # `latest` is the only mutable tag.
      - name: Refuse to overwrite an existing version tag
        run: |
          if docker manifest inspect "$IMAGE:${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "::error::$IMAGE:${{ steps.version.outputs.version }} already exists — version tags are immutable. Bump the version."
            exit 1
          fi
          echo "Tag ${{ steps.version.outputs.version }} is free — proceeding."

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
