apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dionysus-planner.fullname" . }}
  labels:
    {{- include "dionysus-planner.labels" . | nindent 4 }}
spec:
  # Hardcoded, not a values field: SQLite (better-sqlite3) is single-writer.
  # See values.yaml's top-of-file note and design.md Decision 1.
  replicas: 1
  # Recreate, not RollingUpdate: with a ReadWriteOnce PVC, a rolling update
  # would try to start the new pod before the old one releases the volume.
  # See design.md Decision 2.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dionysus-planner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dionysus-planner.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_PATH
              value: "/data/dionysus.db"
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: NEAR_MATCH_DEFAULT_THRESHOLD
              value: {{ .Values.env.nearMatchDefaultThreshold | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          # Timings mirror the Dockerfile's HEALTHCHECK (interval 5s,
          # timeout 3s, start-period 10s, retries 3) — design.md Decision 4.
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dionysus-planner.fullname" . }}-data
